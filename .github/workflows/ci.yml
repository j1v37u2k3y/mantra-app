name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck / Test / Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build (static / GitHub Pages mode)
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Smoke test — start server and hit /api/mantra
        run: |
          node server.js &
          SERVER_PID=$!
          sleep 2
          curl --fail --silent --show-error http://localhost:3174/api/mantra
          echo
          kill $SERVER_PID